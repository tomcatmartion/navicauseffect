version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: navicause_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-navicause_root_2024}
      MYSQL_DATABASE: navicauseffect_v2
      MYSQL_USER: navicause
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-navicause_pass_2024}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-navicause_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: navicause_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: navicause_app
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: "mysql://navicause:${MYSQL_PASSWORD:-navicause_pass_2024}@mysql:3306/navicauseffect_v2"
      REDIS_URL: "redis://redis:6379"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3333}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-in-production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
