version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: navicause_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-navicause_root_2024}
      MYSQL_DATABASE: navicauseffect
      MYSQL_USER: navicause
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-navicause_pass_2024}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: navicause_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
